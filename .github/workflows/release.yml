name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.23'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: v2.14.1
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Datadog credentials
        id: dd-sts
        uses: DataDog/dd-sts-action@9e149e7fdee1bd9da67e8ed18110a7285cfc3fb2 # main
        with:
          policy: public-datadog-code-security-mcp

      - name: Trigger Datadog workflow
        env:
          DD_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
          DD_APP_KEY: ${{ steps.dd-sts.outputs.app_key }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          SHA256_MACOS_ARM64="$(grep 'datadog-code-security-mcp-darwin-arm64.tar.gz' dist/checksums.txt | awk '{print $1}')"
          SHA256_MACOS_X86_64="$(grep 'datadog-code-security-mcp-darwin-amd64.tar.gz' dist/checksums.txt | awk '{print $1}')"
          SHA256_LINUX_ARM64="$(grep 'datadog-code-security-mcp-linux-arm64.tar.gz' dist/checksums.txt | awk '{print $1}')"
          SHA256_LINUX_X86_64="$(grep 'datadog-code-security-mcp-linux-amd64.tar.gz' dist/checksums.txt | awk '{print $1}')"
          # Wait for the short-lived credentials from dd-sts-action to fully propagate in Datadog's
          # backend before triggering the workflow. Without this delay, the API call may return 403
          # even though the app key has the correct permissions.
          sleep 60
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -H "DD-API-KEY: ${DD_API_KEY}" \
            -H "DD-APPLICATION-KEY: ${DD_APP_KEY}" \
            -d "{\"meta\":{\"payload\":{\"version\":\"${VERSION}\",\"sha256_macos_arm64\":\"${SHA256_MACOS_ARM64}\",\"sha256_macos_x86_64\":\"${SHA256_MACOS_X86_64}\",\"sha256_linux_arm64\":\"${SHA256_LINUX_ARM64}\",\"sha256_linux_x86_64\":\"${SHA256_LINUX_X86_64}\"}}}" \
            https://api.datadoghq.com/api/v2/workflows/b146b702-a937-4083-a80a-181994134c9d/instances
